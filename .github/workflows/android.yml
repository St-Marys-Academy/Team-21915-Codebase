name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build TeamCode with Gradle
      run: ./gradlew TeamCode:build

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: TeamCode/build/outputs/

    - name: Rename APK for release
      if: success() && github.event_name == 'push'
      run: mv ./TeamCode/build/outputs/apk/debug/TeamCode-debug.apk ./TeamCode/build/outputs/apk/debug/TeamCode-commit-${{ github.run_number }}.apk

    - name: Create Draft Release
      if: success() && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: build-${{ github.run_number }}
        name: commit ${{ github.run_number }}
        draft: true
        prerelease: false
        files: ./TeamCode/build/outputs/apk/debug/TeamCode-commit-${{ github.run_number }}.apk
